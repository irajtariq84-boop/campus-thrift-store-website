<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Thrift Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo"><img src="thriftlogo.png" alt="CampusThrift Logo"></div>
    <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="items.html">Marketplace</a></li>
        <li><a href="sell.html">Sell</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <img src="https://images.pexels.com/photos/34478374/pexels-photo-34478374.jpeg?auto=compress&cs=tinysrgb&w=1600" class="hero-img">
    <div class="hero-content">
        <h1>SUSTAINABLE</h1>
        <h1>STYLE FOR STUDENTS</h1>
    </div>
</section>

<section class="section light">
    <h2>Shop by Category</h2>
    <div class="categories">
        <a href="items.html"><div class="category"><img src="https://plus.unsplash.com/premium_photo-1732563561246-0432d3af8144?q=80&w=2071&auto=format&fit=crop"><p>Clothing</p></div></a>
        <a href="items.html"><div class="category"><img src="https://plus.unsplash.com/premium_photo-1681276170683-706111cf496e?q=80&w=1170&auto=format&fit=crop"><p>Accessories</p></div></a>
        <a href="items.html"><div class="category"><img src="https://plus.unsplash.com/premium_photo-1682435561654-20d84cef00eb?q=80&w=1018&auto=format&fit=crop"><p>Shoes</p></div></a>
    </div>
</section>

<section class="section light">
    <h2>Featured Products</h2>
    <div id="featured-container" class="products"></div>
</section>

<section class="sale-banner">
    <img src="https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298?q=80&w=1170&auto=format&fit=crop" class="sale-bg">
    <div class="sale-overlay">
        <div class="sale-box">
            <h1 class="sale-title">NEW YEAR SALE</h1>
            <p class="sale-offer">UP TO 60% OFF</p>
            <a href="items.html" class="sale-btn">Shop Now →</a>
        </div>
    </div>
</section>

<section class="section light">
    <h2>Most Loved Products</h2>
    <div id="loved-container" class="products"></div>
    <div style="text-align: center; margin-top: 20px;">
        <a href="items.html" class="btn outline">View All Items</a>
    </div>
</section>

<section class="section cta">
    <div class="cta-box">
        <h2>Got items you don’t need?</h2>
        <a href="sell.html" class="btn outline">Start Selling</a>
    </div>
</section>

<footer>
    <p>© 2026 Campus Thrift Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
